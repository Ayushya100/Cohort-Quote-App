<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quotes App</title>
    <link rel="stylesheet" type="text/css" href="styles.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
</head>
<body>
    <div class="container">
        <div class="container-content">
            <!-- Navbar -->
            <div class="navbar-wrapper">
                <div class="navbar">
                   <p class="title">Quotes App</p>
                </div>
            </div>

            <!-- Quote -->
            <div class="quote-wrapper">
                <div class="quote-container" id="quoteContainer">
                    <img id="quotesBackground" src="" alt="">
                    <p class="copy-message" id="copyMessage">Quote Copied!</p>
                    <div id="quote" class="text-container quote">Main Quote Text</div>
                    <div id="author" class="text-container author">Author Name</div>
                </div>
            </div>
            
            <!-- Metadata Footer -->
            <div class="quote-metadata-wrapper">
                <div class="quote-metadata">
                    <button id="newQuote" class="new-quote-btn">Generate New Quote</button>
                    <!-- Copy and Share Buttons -->
                    <div class="right-wrapper">
                        <button id="copyButton" class="copy-btn">
                            <span class="material-symbols-rounded">content_copy</span>
                        </button>
                        <button class="share-btn" id="shareButton">
                            <span class="material-symbols-rounded">share</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- JS Script -->
    <script src="quotes.js"></script>
</body>
</html>
